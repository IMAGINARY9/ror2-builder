<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoR2 Pool Optimizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🎮 Risk of Rain 2 - Pool Optimizer</h1>
            <div class="score-display">
                <span class="label">Iteration:</span>
                <span id="iterationCount" class="score">0</span>
                <span class="label">Current Score:</span>
                <span id="currentScore" class="score">0</span>
                <span class="label">Best:</span>
                <span id="bestScore" class="score best">0</span>
            </div>
        </header>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Current Pool (Drop Zone) -->
            <section class="pool-section">
                <div class="section-header">
                    <h2>Current Pool</h2>
                    <button id="savePool" class="btn btn-secondary">Save</button>
                    <button id="clearPool" class="btn btn-secondary">Clear</button>
                    <button id="randomPool" class="btn btn-secondary">Init (Random)</button>
                </div>
                
                <div id="poolDropZone" class="drop-zone pool-zone">
                    <div class="empty-state">
                        <p>Drag items here to build your pool</p>
                    </div>
                </div>
            </section>

            <!-- Available Items -->
            <section class="items-section">
                <div class="section-header">
                    <h2>Available Items</h2>
                    <div class="filters">
                        <button class="filter-btn active" data-rarity="all">All</button>
                        <button class="filter-btn" data-rarity="white">White</button>
                        <button class="filter-btn" data-rarity="green">Green</button>
                        <button class="filter-btn" data-rarity="red">Red</button>
                        <button class="filter-btn" data-rarity="yellow">Boss</button>
                        <button class="filter-btn" data-rarity="blue">Lunar</button>
                    </div>
                </div>
                
                <div id="itemsGrid" class="items-grid">
                    <!-- Items will be populated here -->
                </div>
            </section>
        </div>

        <!-- Optimization Controls -->
        <section class="controls-section">
            <h2>Optimization</h2>
            
            <div class="controls-grid">
                <div class="control-group">
                    <label for="playStyle">Play Style: <span class="help-text" title="Build focus: damage over time, crowd control, or mobility">(?)</span></label>
                    <select id="playStyle">
                        <option value="">None</option>
                        <option value="cc">Crowd Control (CC)</option>
                        <option value="frenzy">Frenzy (On-Kill)</option>
                        <option value="mobile">Mobile (Movement)</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="kOpt">K-opt: <span id="kOptValue" class="slider-value">1</span> <span class="help-text" title="Number of items to swap in each iteration. Higher = more exploration, slower.">(?)</span></label>
                    <input type="range" id="kOpt" min="1" max="5" step="1" value="1">
                </div>
                
                <div class="control-group">
                    <label for="synergyWeight">Synergy Weight: <span id="synergyWeightValue" class="slider-value">2.0</span> <span class="help-text" title="Balance between item coverage and synergy. 0 = coverage only, higher = more synergy focus.">(?)</span></label>
                    <input type="range" id="synergyWeight" min="0" max="5" step="0.1" value="2.0">
                </div>
                
                <div class="control-group">
                    <label for="styleWeight">Style Weight: <span id="styleWeightValue" class="slider-value">8.0</span> <span class="help-text" title="How much to favor items matching your play style.">(?)</span></label>
                    <input type="range" id="styleWeight" min="0" max="10" step="0.5" value="8.0">
                </div>
                
                <div class="control-group">
                    <label for="diversityWeight">Diversity Weight: <span id="diversityWeightValue" class="slider-value">0.5</span> <span class="help-text" title="Bonus for balanced rarity distribution.">(?)</span></label>
                    <input type="range" id="diversityWeight" min="0" max="2" step="0.1" value="0.5">
                </div>
                
                <div class="control-group">
                    <label for="coverageWeight">Coverage Weight: <span id="coverageWeightValue" class="slider-value">0.3</span> <span class="help-text" title="Bonus for variety of mechanical tags.">(?)</span></label>
                    <input type="range" id="coverageWeight" min="0" max="2" step="0.1" value="0.3">
                </div>
            </div>
            
            <div class="control-buttons">
                <button id="nextIteration" class="btn btn-primary">Optimize (Next Step)</button>
            </div>
            
            <div id="optimizationStatus" class="status-bar">
                <div class="status-text">Ready</div>
                <div class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
            </div>
        </section>

        <!-- Optimization History -->
        <section class="history-section">
            <h2>Optimization History</h2>
            <div id="historyTable" class="history-table">
                <!-- History entries will be populated here -->
            </div>
        </section>
    </div>

    <!-- Item Details Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody">
                <!-- Item details will be shown here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
