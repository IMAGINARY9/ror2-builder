<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoR2 Pool Optimizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🎮 Risk of Rain 2 - Pool Optimizer</h1>
            <div class="score-display">
                <span class="label">Current Score:</span>
                <span id="currentScore" class="score">0</span>
                <span class="label">Best:</span>
                <span id="bestScore" class="score best">0</span>
            </div>
        </header>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Current Pool (Drop Zone) -->
            <section class="pool-section">
                <div class="section-header">
                    <h2>Current Pool</h2>
                    <button id="savePool" class="btn btn-secondary">Save</button>
                    <button id="loadPool" class="btn btn-secondary">Load</button>
                    <button id="clearPool" class="btn btn-secondary">Clear</button>
                    <button id="randomPool" class="btn btn-secondary">Random</button>
                </div>
                
                <div id="poolDropZone" class="drop-zone pool-zone">
                    <div class="empty-state">
                        <p>Drag items here to build your pool</p>
                    </div>
                </div>
                
                <!-- Score Breakdown -->
                <div class="score-breakdown">
                    <h3>Score Breakdown</h3>
                    <div id="scoreDetails">
                        <div class="score-item">
                            <span>Coverage:</span>
                            <span id="scoreCoverage">0</span>
                        </div>
                        <div class="score-item">
                            <span>Synergy:</span>
                            <span id="scoreSynergy">0</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Available Items -->
            <section class="items-section">
                <div class="section-header">
                    <h2>Available Items</h2>
                    <div class="filters">
                        <button class="filter-btn active" data-rarity="all">All</button>
                        <button class="filter-btn" data-rarity="white">White</button>
                        <button class="filter-btn" data-rarity="green">Green</button>
                        <button class="filter-btn" data-rarity="red">Red</button>
                        <button class="filter-btn" data-rarity="yellow">Boss</button>
                        <button class="filter-btn" data-rarity="blue">Lunar</button>
                    </div>
                </div>
                
                <div id="itemsGrid" class="items-grid">
                    <!-- Items will be populated here -->
                </div>
            </section>
        </div>

        <!-- Optimization Controls -->
        <section class="controls-section">
            <h2>Optimization</h2>
            
            <div class="controls-grid">
                <div class="control-group">
                    <label for="kOpt">K-opt:</label>
                    <input type="number" id="kOpt" min="1" max="5" value="1">
                </div>
                
                <div class="control-group">
                    <label for="maxIterations">Max Iterations:</label>
                    <input type="number" id="maxIterations" min="10" max="1000" value="100">
                </div>
                
                <div class="control-group">
                    <label for="convergence">Convergence:</label>
                    <input type="number" id="convergence" min="5" max="50" value="10">
                </div>
                
                <div class="control-group">
                    <label for="synergyWeight">Synergy Weight:</label>
                    <input type="number" id="synergyWeight" min="0" max="1" step="0.1" value="0">
                </div>
            </div>
            
            <div class="control-buttons">
                <button id="startOptimization" class="btn btn-primary">Start Optimization</button>
                <button id="stopOptimization" class="btn btn-secondary" disabled>Stop</button>
            </div>
            
            <div id="optimizationStatus" class="status-bar">
                <div class="status-text">Ready</div>
                <div class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
            </div>
        </section>

        <!-- Optimization History -->
        <section class="history-section">
            <h2>Optimization History</h2>
            <canvas id="historyChart"></canvas>
            <div id="historyTable" class="history-table">
                <!-- History entries will be populated here -->
            </div>
        </section>
    </div>

    <!-- Item Details Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody">
                <!-- Item details will be shown here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
